services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: riftmeta
      POSTGRES_USER: riftmeta
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-riftmeta_secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U riftmeta"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      RIOT_API_KEY: ${RIOT_API_KEY}
      DATABASE_URL: postgres://riftmeta:${POSTGRES_PASSWORD:-riftmeta_secret}@postgres:5432/riftmeta?sslmode=disable
      REDIS_URL: redis://redis:6379/0
      DEFAULT_REGION: ${DEFAULT_REGION:-na1}
      DEFAULT_ROUTING: ${DEFAULT_ROUTING:-americas}
      SKIP_INITIAL_WORKER: ${SKIP_INITIAL_WORKER:-false}
      PORT: 8080
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3001:80"

volumes:
  postgres_data:
  redis_data:
